services:
  ui:
    build:
      context: ../habistride-nextjs-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: habistride_ui
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:3000
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3100:3001"
    depends_on:
      - api

  api:
    build: .
    container_name: habistride_api
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: Kim123Dat@
      DB_DATABASE: HabiStride
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-HabiStride <onboarding@resend.dev>}
      EMAIL_VERIFICATION_SECRET: ${EMAIL_VERIFICATION_SECRET:-local-email-verification-secret}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: habit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Kim123Dat@
      POSTGRES_DB: HabiStride
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d HabiStride"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
